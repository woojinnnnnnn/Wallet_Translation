<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet Transaction Viewer</title>
    <meta name="description" content="A transaction viewer that translates wallet activity into plain language and flags risk signals." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Wallet Transaction Viewer" />
    <meta property="og:description" content="A transaction viewer that translates wallet activity into plain language and flags risk signals." />
    <meta property="og:image" content="https://wallet0translator.wallet0app.workers.dev/og-image.png" />
    <meta property="og:url" content="https://wallet0translator.wallet0app.workers.dev" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wallet Transaction Viewer" />
    <meta name="twitter:description" content="A transaction viewer that translates wallet activity into plain language and flags risk signals." />
    <meta name="twitter:image" content="https://wallet0translator.wallet0app.workers.dev/og-image.png" />
    <link id="favicon-link" rel="icon" type="image/png" href="/favicon-dark.png" />
    <script>
      // This has to run inline, synchronously, before any module loads —
      // otherwise the page flashes the wrong theme/favicon on first paint.
      // That means it necessarily duplicates a bit of what
      // src/hooks/useTheme.ts does at runtime: the 'theme' localStorage key
      // and the '/favicon-{theme}.png' path pattern must stay in sync with
      // that file if either ever changes.
      (function () {
        var stored = localStorage.getItem('theme');
        var isValidStored = stored === 'light' || stored === 'dark';
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = isValidStored ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('favicon-link').href = '/favicon-' + theme + '.png';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
