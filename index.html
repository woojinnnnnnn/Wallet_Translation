<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet Transaction Viewer</title>
    <link id="favicon-link" rel="icon" type="image/png" href="/favicon-dark.png" />
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var isValidStored = stored === 'light' || stored === 'dark';
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = isValidStored ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('favicon-link').href = '/favicon-' + theme + '.png';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
